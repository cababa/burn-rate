<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>THE NEXT BIG THING</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@400;700&family=Space+Grotesk:wght@500;700&display=swap"
    rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
            mono: ['JetBrains Mono', 'monospace'],
            display: ['Space Grotesk', 'sans-serif'],
          },
          colors: {
            // Light neomorphism palette
            background: '#E8ECEF',
            surface: '#F5F7FA',
            border: '#D1D9E0',
            // Accent colors (slightly softened for light theme)
            primary: '#00D67E',
            danger: '#E53E3E',
            warning: '#DD6B20',
            info: '#3182CE',
            // Neomorphism shadow colors
            'neo-dark': '#C8CED3',
            'neo-light': '#FFFFFF',
          },
          boxShadow: {
            'neo': '8px 8px 16px #C8CED3, -8px -8px 16px #FFFFFF',
            'neo-sm': '4px 4px 8px #C8CED3, -4px -4px 8px #FFFFFF',
            'neo-lg': '12px 12px 24px #C8CED3, -12px -12px 24px #FFFFFF',
            'neo-inset': 'inset 4px 4px 8px #C8CED3, inset -4px -4px 8px #FFFFFF',
            'neo-pressed': 'inset 2px 2px 5px #C8CED3, inset -2px -2px 5px #FFFFFF',
          },
          animation: {
            'draw-card': 'drawCard 0.3s cubic-bezier(0.16, 1, 0.3, 1) backwards',
            'pulse-fast': 'pulse 1s cubic-bezier(0.4, 0, 0.6, 1) infinite',
            'archive-card': 'archiveCard 0.5s ease-out forwards',
            'discard-card': 'discardCard 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards',
          },
          keyframes: {
            drawCard: {
              '0%': { opacity: '0', transform: 'translateX(50px) rotate(5deg) scale(0.9)' },
              '100%': { opacity: '1', transform: 'translateX(0) rotate(0) scale(1)' },
            },
            discardCard: {
              '0%': { opacity: '1', transform: 'translateX(0) rotate(0) scale(1)' },
              '100%': { opacity: '0', transform: 'translateX(-100px) rotate(-10deg) scale(0.8)' },
            },
            archiveCard: {
              '0%': { opacity: '1', filter: 'blur(0) brightness(1)', transform: 'scale(1)' },
              '50%': { filter: 'blur(3px) brightness(0.7)', transform: 'scale(0.9) rotate(2deg)' },
              '100%': { opacity: '0', filter: 'blur(8px) brightness(0.3)', transform: 'scale(0.6) rotate(5deg) translateY(-20px)' },
            }
          }
        }
      }
    }
  </script>
  <style>
    body {
      background-color: #E8ECEF;
      color: #1A202C;
    }

    /* Light mode scrollbar */
    ::-webkit-scrollbar {
      width: 10px;
    }

    ::-webkit-scrollbar-track {
      background: #E8ECEF;
      border-radius: 5px;
    }

    ::-webkit-scrollbar-thumb {
      background: linear-gradient(145deg, #D1D9E0, #B8C4CC);
      border-radius: 5px;
      border: 2px solid #E8ECEF;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: linear-gradient(145deg, #C8CED3, #A8B4BC);
    }

    /* Neomorphism utility classes */
    .neo-raised {
      background: linear-gradient(145deg, #F5F7FA, #E0E4E8);
      box-shadow: 8px 8px 16px #C8CED3, -8px -8px 16px #FFFFFF;
    }

    .neo-pressed {
      background: linear-gradient(145deg, #E0E4E8, #F5F7FA);
      box-shadow: inset 4px 4px 8px #C8CED3, inset -4px -4px 8px #FFFFFF;
    }

    .neo-flat {
      background: #E8ECEF;
      box-shadow: 6px 6px 12px #C8CED3, -6px -6px 12px #FFFFFF;
    }
  </style>
  <script type="module" src="/index.tsx"></script>
</head>

<body>
  <div id="root"></div>
</body>

</html>
